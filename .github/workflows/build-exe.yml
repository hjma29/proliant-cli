name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: pcli-windows-amd64.exe
            pyinstaller_name: pcli.exe
          - os: ubuntu-latest
            artifact: pcli-linux-amd64
            pyinstaller_name: pcli
          - os: macos-latest
            artifact: pcli-macos-amd64
            pyinstaller_name: pcli

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install .[all]
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --name pcli --console src/pcli/cli.py

      - name: Rename binary
        shell: bash
        run: mv dist/${{ matrix.pyinstaller_name }} dist/${{ matrix.artifact }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/${{ matrix.artifact }}
          generate_release_notes: true

