name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: proliant-cli-windows.zip
          - os: ubuntu-latest
            artifact: proliant-cli-linux
            pyinstaller_name: pcli
          - os: macos-latest
            artifact: proliant-cli-macos
            pyinstaller_name: pcli

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Stamp version from git tag (Linux/macOS)
        if: runner.os != 'Windows' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Stamp version from git tag (Windows)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          (Get-Content pyproject.toml) -replace '^version = .*', "version = `"$version`"" | Set-Content pyproject.toml

      - name: Install dependencies
        run: |
          pip install .[all]
          pip install pyinstaller

      - name: Build binary (Windows — onedir to avoid temp DLL extraction issues)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onedir --name pcli --console --copy-metadata pcli src/pcli/cli.py

      - name: Build binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onefile --name pcli --console --copy-metadata pcli src/pcli/cli.py

      - name: Package Windows binary as zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\pcli\* -DestinationPath dist\proliant-cli-windows.zip

      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: mv dist/${{ matrix.pyinstaller_name }} dist/${{ matrix.artifact }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/${{ matrix.artifact }}
          generate_release_notes: true

