name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: proliant-cli-windows-setup.exe
          - os: ubuntu-latest
            artifact: proliant-cli-linux-x86
          - os: ubuntu-24.04-arm
            artifact: proliant-cli-linux-arm64
          - os: macos-latest
            artifact: proliant-cli-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache Nuitka (toolchain downloads + compiled objects)
        uses: actions/cache@v4
        with:
          path: .nuitka-cache
          key: nuitka-${{ runner.os }}-py3.12-${{ github.run_id }}
          restore-keys: |
            nuitka-${{ runner.os }}-py3.12-

      - name: Stamp version from git tag (Linux/macOS)
        if: runner.os != 'Windows' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          perl -i -pe "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Stamp version from git tag (Windows)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          (Get-Content pyproject.toml) -replace '^version = .*', "version = `"$version`"" | Set-Content pyproject.toml

      - name: Install dependencies
        run: |
          pip install .[all]
          pip install nuitka ordered-set

      - name: Install libfuse2 (Linux — required for Nuitka onefile)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libfuse2

      - name: Build binary (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION=${GITHUB_REF_NAME#v}
          else
            VERSION=$(grep '^version' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          fi
          python -m nuitka \
            --onefile \
            --assume-yes-for-downloads \
            --include-package=proliant \
            --include-package=proliant.ilo \
            --include-package=proliant.com \
            --include-package=proliant.oneview \
            --include-package=proliant.spp \
            --include-package=proliant.setting \
            --include-package=proliant.setup \
            --include-package=proliant.common \
            --include-package=yaml \
            --include-package=certifi \
            --include-package-data=certifi \
            --include-distribution-metadata=proliant \
            --company-name=HPE \
            --product-name=proliant \
            --product-version=$VERSION \
            --onefile-tempdir-spec='{CACHE_DIR}/proliant/{VERSION}' \
            --output-filename=proliant \
            --output-dir=dist \
            src/proliant/cli.py

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
            $version = (Select-String -Path pyproject.toml -Pattern '^version').Line -replace '.*"(.*)".*', '$1'
          }
          # Windows ships as a --standalone (one-directory) build, NOT --onefile.
          # A onefile exe self-extracts to a user-writable cache dir at launch,
          # which Defender/CrowdStrike Falcon heuristically flag as a dropper.
          # The standalone folder is packaged into a signed Inno Setup installer
          # that installs into Program Files (see the packaging step below).
          python -m nuitka `
            --standalone `
            --assume-yes-for-downloads `
            --include-package=proliant `
            --include-package=proliant.ilo `
            --include-package=proliant.com `
            --include-package=proliant.oneview `
            --include-package=proliant.spp `
            --include-package=proliant.setting `
            --include-package=proliant.setup `
            --include-package=proliant.common `
            --include-package=yaml `
            --include-package=certifi `
            --include-package-data=certifi `
            --include-distribution-metadata=proliant `
            --company-name=HPE `
            --product-name=proliant-cli `
            --product-version=$version `
            --output-filename=proliant.exe `
            --output-dir=dist `
            src/proliant/cli.py
          # Nuitka names the standalone folder after the entry module: cli.dist.
          # Rename it to the product identity so the installer bundles a clean
          # "proliant-cli" folder.
          Rename-Item dist\cli.dist proliant-cli

      - name: Package Windows installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
            $version = (Select-String -Path pyproject.toml -Pattern '^version').Line -replace '.*"(.*)".*', '$1'
          }
          choco install innosetup --no-progress -y
          # Chocolatey's innosetup package installs ISCC.exe under Program Files
          # and doesn't reliably create a PATH shim, so resolve it explicitly.
          $iscc = Get-Command iscc -ErrorAction SilentlyContinue
          if ($iscc) {
            $isccPath = $iscc.Source
          } else {
            $isccPath = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          }
          if (-not (Test-Path $isccPath)) {
            throw "ISCC.exe not found at $isccPath"
          }
          # Inno resolves relative [Files] Source paths against the .iss file's
          # own directory (installer\), NOT the working dir — so pass absolute
          # paths for both the source folder and the output dir.
          $srcDir = Join-Path (Get-Location) 'dist\proliant-cli'
          $outDir = Join-Path (Get-Location) 'dist'
          & $isccPath /DMyAppVersion=$version /DSourceDir=$srcDir /O$outDir installer\proliant-cli.iss

      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: mv dist/proliant dist/${{ matrix.artifact }}

      - name: Extract release notes from CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows-latest'
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Extract the block between "## v$VERSION" and the next "## v" heading
          awk "/^## v${VERSION}/{found=1; next} found && /^## v/{exit} found{print}" CHANGELOG.md \
            > release_notes.txt
          # Fallback if section not found
          if [ ! -s release_notes.txt ]; then
            echo "See CHANGELOG.md for details." > release_notes.txt
          fi

      - name: Upload build artifact (CI validation)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/${{ matrix.artifact }}
          # Only the windows leg writes the release body; other legs just attach their binary.
          body_path: ${{ matrix.os == 'windows-latest' && 'release_notes.txt' || '' }}
