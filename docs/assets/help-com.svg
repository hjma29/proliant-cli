<svg xmlns="http://www.w3.org/2000/svg" width="620" height="757">
<style>text{font-family:Consolas,"Courier New",monospace;font-size:12px;}</style>
<rect width="620" height="757" rx="10" fill="#282a36"/>
<rect width="620" height="34" rx="10" fill="#1e1f29"/>
<rect y="24" width="620" height="10" fill="#1e1f29"/>
<circle cx="20" cy="17" r="6" fill="#ff5555"/>
<circle cx="40" cy="17" r="6" fill="#f1fa8c"/>
<circle cx="60" cy="17" r="6" fill="#50fa7b"/>
<text x="310" y="22" text-anchor="middle" fill="#6272a4" font-size="12">Windows PowerShell</text>
<text x="18" y="53" xml:space="preserve"><tspan fill="#50fa7b">PS C:\&gt; </tspan><tspan fill="#f8f8f2">proliant com --help</tspan></text>
<text x="18" y="70" xml:space="preserve"><tspan fill="#f1fa8c">usage: proliant com [-h] [--json] [--region REGION] COMMAND ...</tspan></text>
<text x="18" y="87" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="104" xml:space="preserve"><tspan fill="#f8f8f2">HPE Compute Ops Management Python CLI</tspan></text>
<text x="18" y="121" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="138" xml:space="preserve"><tspan fill="#f1fa8c">positional arguments:</tspan></text>
<text x="18" y="155" xml:space="preserve"><tspan fill="#f8f8f2">  COMMAND</tspan></text>
<text x="18" y="172" xml:space="preserve"><tspan fill="#f8f8f2">    login          Login (Okta Verify push or password, auto-detected)</tspan></text>
<text x="18" y="189" xml:space="preserve"><tspan fill="#f8f8f2">    logout         Remove cached credentials and token</tspan></text>
<text x="18" y="206" xml:space="preserve"><tspan fill="#f8f8f2">    whoami         Show current login (email/login method or API client)</tspan></text>
<text x="18" y="223" xml:space="preserve"><tspan fill="#f8f8f2">    devices        Manage workspace devices</tspan></text>
<text x="18" y="240" xml:space="preserve"><tspan fill="#f8f8f2">    servers        List or describe servers</tspan></text>
<text x="18" y="257" xml:space="preserve"><tspan fill="#f8f8f2">    workspaces     List or switch workspaces</tspan></text>
<text x="18" y="274" xml:space="preserve"><tspan fill="#f8f8f2">    workspace      Alias for 'workspaces use' — switch active workspace</tspan></text>
<text x="18" y="291" xml:space="preserve"><tspan fill="#f8f8f2">    regions        List or switch COM regions</tspan></text>
<text x="18" y="308" xml:space="preserve"><tspan fill="#f8f8f2">    region         Alias for 'regions use' — switch active COM region</tspan></text>
<text x="18" y="325" xml:space="preserve"><tspan fill="#f8f8f2">    bundles        List SPP firmware bundles</tspan></text>
<text x="18" y="342" xml:space="preserve"><tspan fill="#f8f8f2">    reports        Fleet inventory reports</tspan></text>
<text x="18" y="359" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="376" xml:space="preserve"><tspan fill="#f1fa8c">options:</tspan></text>
<text x="18" y="393" xml:space="preserve"><tspan fill="#f8f8f2">  -h, --help       show this help message and exit</tspan></text>
<text x="18" y="410" xml:space="preserve"><tspan fill="#f8f8f2">  --json           Output as JSON (for piping/scripting)</tspan></text>
<text x="18" y="427" xml:space="preserve"><tspan fill="#f8f8f2">  --region REGION  COM region for this command only (default: active region</tspan></text>
<text x="18" y="444" xml:space="preserve"><tspan fill="#f8f8f2">                   for the current workspace — see 'proliant com regions</tspan></text>
<text x="18" y="461" xml:space="preserve"><tspan fill="#f8f8f2">                   list')</tspan></text>
<text x="18" y="478" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="495" xml:space="preserve"><tspan fill="#f1fa8c">examples:</tspan></text>
<text x="18" y="512" xml:space="preserve"><tspan fill="#f8f8f2">  proliant com login</tspan></text>
<text x="18" y="529" xml:space="preserve"><tspan fill="#f8f8f2">          proliant com whoami</tspan></text>
<text x="18" y="546" xml:space="preserve"><tspan fill="#f8f8f2">          proliant com devices list</tspan></text>
<text x="18" y="563" xml:space="preserve"><tspan fill="#f8f8f2">          proliant com devices add --serial-number TWA25380A01</tspan></text>
<text x="18" y="580" xml:space="preserve"><tspan fill="#f8f8f2">          proliant com servers list</tspan></text>
<text x="18" y="597" xml:space="preserve"><tspan fill="#f8f8f2">          proliant com servers describe TWA25380A01</tspan></text>
<text x="18" y="614" xml:space="preserve"><tspan fill="#f8f8f2">          proliant com bundles list --gen 12</tspan></text>
<text x="18" y="631" xml:space="preserve"><tspan fill="#f8f8f2">          proliant com workspaces list</tspan></text>
<text x="18" y="648" xml:space="preserve"><tspan fill="#f8f8f2">          proliant com workspaces use MyWorkspace</tspan></text>
<text x="18" y="665" xml:space="preserve"><tspan fill="#f8f8f2">          proliant com regions list</tspan></text>
<text x="18" y="682" xml:space="preserve"><tspan fill="#f8f8f2">          proliant com regions use eu-central</tspan></text>
<text x="18" y="699" xml:space="preserve"><tspan fill="#f8f8f2">          proliant com reports memory</tspan></text>
<text x="18" y="716" xml:space="preserve"><tspan fill="#f8f8f2">          proliant com reports gpu</tspan></text>
<text x="18" y="733" xml:space="preserve"><tspan fill="#f8f8f2">        </tspan></text>
</svg>