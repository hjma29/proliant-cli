<svg xmlns="http://www.w3.org/2000/svg" width="620" height="672">
<style>text{font-family:Consolas,"Courier New",monospace;font-size:12px;}</style>
<rect width="620" height="672" rx="10" fill="#282a36"/>
<rect width="620" height="34" rx="10" fill="#1e1f29"/>
<rect y="24" width="620" height="10" fill="#1e1f29"/>
<circle cx="20" cy="17" r="6" fill="#ff5555"/>
<circle cx="40" cy="17" r="6" fill="#f1fa8c"/>
<circle cx="60" cy="17" r="6" fill="#50fa7b"/>
<text x="310" y="22" text-anchor="middle" fill="#6272a4" font-size="12">Windows PowerShell</text>
<text x="18" y="53" xml:space="preserve"><tspan fill="#50fa7b">PS C:\&gt; </tspan><tspan fill="#f8f8f2">proliant ilo --help</tspan></text>
<text x="18" y="70" xml:space="preserve"><tspan fill="#f1fa8c">usage: proliant ilo [-h] [--version] [--json] RESOURCE ...</tspan></text>
<text x="18" y="87" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="104" xml:space="preserve"><tspan fill="#f8f8f2">HPE iLO firmware/hardware inventory and update tool</tspan></text>
<text x="18" y="121" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="138" xml:space="preserve"><tspan fill="#f1fa8c">positional arguments:</tspan></text>
<text x="18" y="155" xml:space="preserve"><tspan fill="#f8f8f2">  RESOURCE</tspan></text>
<text x="18" y="172" xml:space="preserve"><tspan fill="#f8f8f2">    servers        Server inventory and details</tspan></text>
<text x="18" y="189" xml:space="preserve"><tspan fill="#f8f8f2">    firmware       Firmware inventory and update operations</tspan></text>
<text x="18" y="206" xml:space="preserve"><tspan fill="#f8f8f2">    nic-host       Host NIC firmware versions</tspan></text>
<text x="18" y="223" xml:space="preserve"><tspan fill="#f8f8f2">    nic-ilo        iLO dedicated NIC: LLDP status, neighbor info, IP</tspan></text>
<text x="18" y="240" xml:space="preserve"><tspan fill="#f8f8f2">    nic            NIC link status + MAC address</tspan></text>
<text x="18" y="257" xml:space="preserve"><tspan fill="#f8f8f2">    storage        Storage controller + drive firmware</tspan></text>
<text x="18" y="274" xml:space="preserve"><tspan fill="#f8f8f2">    cpu            CPU model + microcode version</tspan></text>
<text x="18" y="291" xml:space="preserve"><tspan fill="#f8f8f2">    memory         DIMM info + firmware revision</tspan></text>
<text x="18" y="308" xml:space="preserve"><tspan fill="#f8f8f2">    com            HPE Compute Ops Management registration status</tspan></text>
<text x="18" y="325" xml:space="preserve"><tspan fill="#f8f8f2">    full           Full firmware inventory</tspan></text>
<text x="18" y="342" xml:space="preserve"><tspan fill="#f8f8f2">    disk-map       Drive bay + serial number map (cross-ref with lsblk)</tspan></text>
<text x="18" y="359" xml:space="preserve"><tspan fill="#f8f8f2">    serial         Server model, serial number, and product ID (for COM</tspan></text>
<text x="18" y="376" xml:space="preserve"><tspan fill="#f8f8f2">                   onboarding)</tspan></text>
<text x="18" y="393" xml:space="preserve"><tspan fill="#f8f8f2">    update-method  Full firmware inventory with update method (BMC / UEFI /</tspan></text>
<text x="18" y="410" xml:space="preserve"><tspan fill="#f8f8f2">                   OS) per component</tspan></text>
<text x="18" y="427" xml:space="preserve"><tspan fill="#f8f8f2">    license        iLO license info and key management</tspan></text>
<text x="18" y="444" xml:space="preserve"><tspan fill="#f8f8f2">    power          Server power operations</tspan></text>
<text x="18" y="461" xml:space="preserve"><tspan fill="#f8f8f2">    uid            Control server UID indicator light</tspan></text>
<text x="18" y="478" xml:space="preserve"><tspan fill="#f8f8f2">    boot           Inspect and override server boot behavior</tspan></text>
<text x="18" y="495" xml:space="preserve"><tspan fill="#f8f8f2">    bios           Inspect and change BIOS settings</tspan></text>
<text x="18" y="512" xml:space="preserve"><tspan fill="#f8f8f2">    network        Change iLO network configuration</tspan></text>
<text x="18" y="529" xml:space="preserve"><tspan fill="#f8f8f2">    reports        Fleet hardware reports</tspan></text>
<text x="18" y="546" xml:space="preserve"><tspan fill="#f8f8f2">    init           Guided setup of inventory.ini (alias for 'proliant setup')</tspan></text>
<text x="18" y="563" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="580" xml:space="preserve"><tspan fill="#f1fa8c">options:</tspan></text>
<text x="18" y="597" xml:space="preserve"><tspan fill="#f8f8f2">  -h, --help       show this help message and exit</tspan></text>
<text x="18" y="614" xml:space="preserve"><tspan fill="#f8f8f2">  --version, -V    show program's version number and exit</tspan></text>
<text x="18" y="631" xml:space="preserve"><tspan fill="#f8f8f2">  --json           Output structured JSON (for piping to jq / ConvertFrom-</tspan></text>
<text x="18" y="648" xml:space="preserve"><tspan fill="#f8f8f2">                   Json)</tspan></text>
</svg>