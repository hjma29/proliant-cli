<svg xmlns="http://www.w3.org/2000/svg" width="742" height="1216">
<style>text{font-family:Consolas,"Courier New",monospace;font-size:12px;}</style>
<rect width="742" height="1216" rx="10" fill="#282a36"/>
<rect width="742" height="34" rx="10" fill="#1e1f29"/>
<rect y="24" width="742" height="10" fill="#1e1f29"/>
<circle cx="20" cy="17" r="6" fill="#ff5555"/>
<circle cx="40" cy="17" r="6" fill="#f1fa8c"/>
<circle cx="60" cy="17" r="6" fill="#50fa7b"/>
<text x="371" y="22" text-anchor="middle" fill="#6272a4" font-size="12">Windows PowerShell</text>
<text x="18" y="53" xml:space="preserve"><tspan fill="#50fa7b">PS C:\&gt; </tspan><tspan fill="#f8f8f2">proliant oneview --help</tspan></text>
<text x="18" y="70" xml:space="preserve"><tspan fill="#f1fa8c">usage: proliant oneview [-h] [--json] COMMAND ...</tspan></text>
<text x="18" y="87" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="104" xml:space="preserve"><tspan fill="#f8f8f2">HPE OneView management</tspan></text>
<text x="18" y="121" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="138" xml:space="preserve"><tspan fill="#f1fa8c">positional arguments:</tspan></text>
<text x="18" y="155" xml:space="preserve"><tspan fill="#f8f8f2">  COMMAND</tspan></text>
<text x="18" y="172" xml:space="preserve"><tspan fill="#f8f8f2">    servers (server)    List managed servers</tspan></text>
<text x="18" y="189" xml:space="preserve"><tspan fill="#f8f8f2">    firmware            Appliance firmware bundles, repositories, and</tspan></text>
<text x="18" y="206" xml:space="preserve"><tspan fill="#f8f8f2">                        compliance</tspan></text>
<text x="18" y="223" xml:space="preserve"><tspan fill="#f8f8f2">    networks (network)  List or describe ethernet networks</tspan></text>
<text x="18" y="240" xml:space="preserve"><tspan fill="#f8f8f2">    networksets (networkset)</tspan></text>
<text x="18" y="257" xml:space="preserve"><tspan fill="#f8f8f2">                        List or describe network sets</tspan></text>
<text x="18" y="274" xml:space="preserve"><tspan fill="#f8f8f2">    uplinksets (uplinkset)</tspan></text>
<text x="18" y="291" xml:space="preserve"><tspan fill="#f8f8f2">                        List or describe uplink sets</tspan></text>
<text x="18" y="308" xml:space="preserve"><tspan fill="#f8f8f2">    server-profiles (server-profile)</tspan></text>
<text x="18" y="325" xml:space="preserve"><tspan fill="#f8f8f2">                        List or describe server profiles</tspan></text>
<text x="18" y="342" xml:space="preserve"><tspan fill="#f8f8f2">    li                  List logical interconnects</tspan></text>
<text x="18" y="359" xml:space="preserve"><tspan fill="#f8f8f2">    lig                 List logical interconnect groups</tspan></text>
<text x="18" y="376" xml:space="preserve"><tspan fill="#f8f8f2">    interconnects (interconnect)</tspan></text>
<text x="18" y="393" xml:space="preserve"><tspan fill="#f8f8f2">                        List interconnect hardware</tspan></text>
<text x="18" y="410" xml:space="preserve"><tspan fill="#f8f8f2">    mac                 Query MAC forwarding-information-base</tspan></text>
<text x="18" y="427" xml:space="preserve"><tspan fill="#f8f8f2">    enclosures (enclosure)</tspan></text>
<text x="18" y="444" xml:space="preserve"><tspan fill="#f8f8f2">                        List physical enclosures</tspan></text>
<text x="18" y="461" xml:space="preserve"><tspan fill="#f8f8f2">    enclosure-groups (enclosure-group)</tspan></text>
<text x="18" y="478" xml:space="preserve"><tspan fill="#f8f8f2">                        List enclosure groups</tspan></text>
<text x="18" y="495" xml:space="preserve"><tspan fill="#f8f8f2">    logical-enclosures (logical-enclosure)</tspan></text>
<text x="18" y="512" xml:space="preserve"><tspan fill="#f8f8f2">                        List logical enclosures</tspan></text>
<text x="18" y="529" xml:space="preserve"><tspan fill="#f8f8f2">    reports             Fleet hardware reports</tspan></text>
<text x="18" y="546" xml:space="preserve"><tspan fill="#f8f8f2">    upgrade             Appliance upgrade readiness &amp; disk cleanup</tspan></text>
<text x="18" y="563" xml:space="preserve"><tspan fill="#f8f8f2">    appliances (appliance)</tspan></text>
<text x="18" y="580" xml:space="preserve"><tspan fill="#f8f8f2">                        List or switch OneView appliances</tspan></text>
<text x="18" y="597" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="614" xml:space="preserve"><tspan fill="#f1fa8c">options:</tspan></text>
<text x="18" y="631" xml:space="preserve"><tspan fill="#f8f8f2">  -h, --help            show this help message and exit</tspan></text>
<text x="18" y="648" xml:space="preserve"><tspan fill="#f8f8f2">  --json                Output as JSON (for piping/scripting)</tspan></text>
<text x="18" y="665" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="682" xml:space="preserve"><tspan fill="#f1fa8c">examples:</tspan></text>
<text x="18" y="699" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview servers list                          List all managed servers</tspan></text>
<text x="18" y="716" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview servers firmware list                 Fleet firmware (all servers)</tspan></text>
<text x="18" y="733" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview servers firmware list --server "Enc1, bay 1"</tspan></text>
<text x="18" y="750" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview firmware bundles                      Registered SPP/SSP bundles</tspan></text>
<text x="18" y="767" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview firmware repository                   Internal + external repositories</tspan></text>
<text x="18" y="784" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview firmware compliance                   Compliance vs newer candidate bundles</tspan></text>
<text x="18" y="801" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview networks list                         All ethernet networks</tspan></text>
<text x="18" y="818" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview networks describe VLAN-160            Network overview + fabric mapping</tspan></text>
<text x="18" y="835" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview networksets list                      All network sets</tspan></text>
<text x="18" y="852" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview uplinksets list                       All uplink sets</tspan></text>
<text x="18" y="869" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview server-profiles list                  All server profiles</tspan></text>
<text x="18" y="886" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview li list                               Logical interconnects</tspan></text>
<text x="18" y="903" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview lig list                              Logical interconnect groups</tspan></text>
<text x="18" y="920" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview interconnects list                    Interconnect hardware</tspan></text>
<text x="18" y="937" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview mac list --address 00:11:22:33:44:55  MAC forwarding table by address</tspan></text>
<text x="18" y="954" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview mac list --vlan 100                   MAC forwarding table by VLAN</tspan></text>
<text x="18" y="971" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview mac describe 00:11:22:33:44:55        Trace a MAC end-to-end through the fabric</tspan></text>
<text x="18" y="988" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview enclosures list                       Physical enclosures</tspan></text>
<text x="18" y="1005" xml:space="preserve"><tspan fill="#f8f8f2">    proliant oneview enclosures describe Enclosure-01       Enclosure bay layout</tspan></text>
<text x="18" y="1022" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview enclosure-groups list                 Enclosure groups</tspan></text>
<text x="18" y="1039" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview logical-enclosures list               Logical enclosures</tspan></text>
<text x="18" y="1056" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview uplinksets describe "pvlan-uplinkset" Full uplink set detail</tspan></text>
<text x="18" y="1073" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview networksets describe "network-set-for-FM"</tspan></text>
<text x="18" y="1090" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview server-profiles describe "ocp-single-node"</tspan></text>
<text x="18" y="1107" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview reports memory</tspan></text>
<text x="18" y="1124" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview upgrade readiness                     Pre-upgrade readiness report</tspan></text>
<text x="18" y="1141" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview upgrade cleanup                       Preview unused firmware baselines</tspan></text>
<text x="18" y="1158" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview upgrade cleanup --yes                 Delete unused baselines (free disk)</tspan></text>
<text x="18" y="1175" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview appliances list                       List configured appliances (* = active)</tspan></text>
<text x="18" y="1192" xml:space="preserve"><tspan fill="#f8f8f2">  proliant oneview appliances use datacenter-b           Switch which appliance commands target</tspan></text>
</svg>