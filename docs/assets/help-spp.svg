<svg xmlns="http://www.w3.org/2000/svg" width="713" height="536">
<style>text{font-family:Consolas,"Courier New",monospace;font-size:12px;}</style>
<rect width="713" height="536" rx="10" fill="#282a36"/>
<rect width="713" height="34" rx="10" fill="#1e1f29"/>
<rect y="24" width="713" height="10" fill="#1e1f29"/>
<circle cx="20" cy="17" r="6" fill="#ff5555"/>
<circle cx="40" cy="17" r="6" fill="#f1fa8c"/>
<circle cx="60" cy="17" r="6" fill="#50fa7b"/>
<text x="356" y="22" text-anchor="middle" fill="#6272a4" font-size="12">Windows PowerShell</text>
<text x="18" y="53" xml:space="preserve"><tspan fill="#50fa7b">PS C:\&gt; </tspan><tspan fill="#f8f8f2">proliant spp --help</tspan></text>
<text x="18" y="70" xml:space="preserve"><tspan fill="#f1fa8c">usage: proliant spp [-h] COMMAND ...</tspan></text>
<text x="18" y="87" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="104" xml:space="preserve"><tspan fill="#f8f8f2">Analyse HPE Service Pack for ProLiant (SPP) catalogs.</tspan></text>
<text x="18" y="121" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="138" xml:space="preserve"><tspan fill="#f1fa8c">positional arguments:</tspan></text>
<text x="18" y="155" xml:space="preserve"><tspan fill="#f8f8f2">  COMMAND</tspan></text>
<text x="18" y="172" xml:space="preserve"><tspan fill="#f8f8f2">    list         List available SPP versions</tspan></text>
<text x="18" y="189" xml:space="preserve"><tspan fill="#f8f8f2">    inspect      Show components in an SPP version</tspan></text>
<text x="18" y="206" xml:space="preserve"><tspan fill="#f8f8f2">    part-number  Find and inspect the fwpkg for a specific part number</tspan></text>
<text x="18" y="223" xml:space="preserve"><tspan fill="#f8f8f2">    download     Download .fwpkg files from an SPP version</tspan></text>
<text x="18" y="240" xml:space="preserve"><tspan fill="#f8f8f2">    diff         Compare two SPP versions</tspan></text>
<text x="18" y="257" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="274" xml:space="preserve"><tspan fill="#f1fa8c">options:</tspan></text>
<text x="18" y="291" xml:space="preserve"><tspan fill="#f8f8f2">  -h, --help     show this help message and exit</tspan></text>
<text x="18" y="308" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="325" xml:space="preserve"><tspan fill="#f1fa8c">examples:</tspan></text>
<text x="18" y="342" xml:space="preserve"><tspan fill="#f8f8f2">  proliant spp list                                     List all gen12 SPP versions</tspan></text>
<text x="18" y="359" xml:space="preserve"><tspan fill="#f8f8f2">  proliant spp list --gen gen11                         List gen11 versions</tspan></text>
<text x="18" y="376" xml:space="preserve"><tspan fill="#f8f8f2">  proliant spp list --gen all                           List all gens</tspan></text>
<text x="18" y="393" xml:space="preserve"><tspan fill="#f8f8f2">  proliant spp inspect gen12 2026.03.00.00              All components in gen12 SPP</tspan></text>
<text x="18" y="410" xml:space="preserve"><tspan fill="#f8f8f2">  proliant spp inspect gen12 2026.03.00.00 --type ilo,bios,nic,storage</tspan></text>
<text x="18" y="427" xml:space="preserve"><tspan fill="#f8f8f2">  proliant spp inspect gen12 2026.03.00.00 --model DL325</tspan></text>
<text x="18" y="444" xml:space="preserve"><tspan fill="#f8f8f2">  proliant spp part-number P26264-001 gen12 2026.03.00.00   Inspect fwpkg(s) for a part number</tspan></text>
<text x="18" y="461" xml:space="preserve"><tspan fill="#f8f8f2">  proliant spp diff gen12 2025.09.01.00 2026.03.00.00   What changed in gen12?</tspan></text>
<text x="18" y="478" xml:space="preserve"><tspan fill="#f8f8f2">  proliant spp diff gen12 2025.09.01.00 2026.03.00.00 --type bios,ilo</tspan></text>
<text x="18" y="495" xml:space="preserve"><tspan fill="#f8f8f2">  proliant spp diff gen12 2025.09.01.00 2026.03.00.00 --all  Include unchanged</tspan></text>
<text x="18" y="512" xml:space="preserve"><tspan fill="#f8f8f2">  proliant spp inspect firmware.fwpkg                   Inspect a local .fwpkg file</tspan></text>
</svg>