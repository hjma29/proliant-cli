<text x="310" y="22" text-anchor="middle" fill="#6272a4" font-size="12">Windows PowerShell</text>
<text x="18" y="53" xml:space="preserve"><tspan fill="#50fa7b">PS C:\&gt; </tspan><tspan fill="#f8f8f2">proliant spp list --gen gen12</tspan></text>
