<text x="18" y="342" xml:space="preserve"><tspan fill="#f8f8f2"></tspan></text>
<text x="18" y="359" xml:space="preserve"><tspan fill="#f8f8f2">Run proliant spp inspect &lt;gen&gt; &lt;version&gt; to analyse a version.</tspan></text>
