# sample-inventory.ini -- working example for 'proliant ilo' and 'proliant oneview'
#
# Copy this file to one of the following locations (first match wins):
#   1. The path in the PCLI_CONFIG environment variable (explicit override)
#   2. ./inventory.ini                          (current directory)
#   3. ~/.config/proliant-cli/inventory.ini      (default -- created by 'proliant setup')
#
# [defaults] holds shared iLO credentials used by any server section that
# doesn't override them. Every other section is a server -- the section
# name is a friendly alias you choose (used with --host); it doesn't need
# to match the iLO or OS hostname. Add 'type = oneview' to a section to
# store a OneView appliance instead of an iLO host.

[defaults]
username = Administrator
password = defaultPassword123

# Uses the [defaults] username/password above -- no override needed.
[dl380-gen11]
host = 192.0.2.10

# Overrides both username and password from [defaults].
[dl345-gen12]
host     = 192.0.2.20
username = localadmin
password = differentPassword456

# A OneView appliance -- 'proliant ilo' commands skip this automatically.
# With only one such section, 'proliant oneview' commands use it directly.
[datacenter-a]
host     = 192.0.2.100
username = Administrator
password = oneviewPassword789
type     = oneview
